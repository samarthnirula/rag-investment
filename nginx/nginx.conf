# Atticus — nginx reverse proxy: TLS termination, security headers, routing.
#
# Routing:
#   /api/*          → FastAPI backend  (http://backend:8000)
#   everything else → Next.js frontend (http://frontend:3000)
#
# Prerequisites:
#   TLS certificate: nginx/certs/fullchain.pem
#   Private key:     nginx/certs/privkey.pem
#
# For local dev self-signed cert:
#   openssl req -x509 -newkey rsa:4096 -keyout nginx/certs/privkey.pem \
#     -out nginx/certs/fullchain.pem -days 365 -nodes -subj "/CN=localhost"

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
}

http {
    # ── Basic hardening ──────────────────────────────────────────────────────
    server_tokens off;
    # Matches the plan's max_upload_mb (50 MB) plus a small buffer for headers.
    # Do NOT raise this — the FastAPI endpoint enforces the same limit in-process.
    client_max_body_size 52m;
    client_body_timeout  60s;
    client_header_timeout 30s;
    keepalive_timeout    65s;
    send_timeout         120s;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Rate limiting — IP-level, supplements app-level per-user limits ──────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS main server ────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Security headers ─────────────────────────────────────────────────

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # CSP tuned for Next.js + Firebase Auth (no Streamlit CDNs).
        # 'unsafe-inline' on script-src is required for Next.js inline hydration chunks.
        # Remove it once the app can provide nonces via Next.js middleware.
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval';
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
            font-src 'self' https://fonts.gstatic.com;
            img-src 'self' data: blob: https://lh3.googleusercontent.com;
            connect-src 'self'
                https://*.firebaseapp.com
                https://identitytoolkit.googleapis.com
                https://securetoken.googleapis.com
                https://firebaseinstallations.googleapis.com
                wss:;
            frame-ancestors 'none';
            base-uri 'self';
            form-action 'self';
        " always;

        # ── /api/* → FastAPI backend ─────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_read_timeout  300s;
            proxy_send_timeout  300s;
            proxy_buffers       8 32k;
            proxy_buffer_size   64k;
        }

        # ── Health check (bypasses rate limit) ───────────────────────────────
        location = /api/health {
            proxy_pass http://backend:8000/api/health;
            access_log off;
        }

        # ── Next.js frontend (everything else) ───────────────────────────────
        location / {
            limit_req zone=api burst=40 nodelay;

            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;

            # Next.js HMR WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            proxy_read_timeout  60s;
            proxy_send_timeout  60s;
        }
    }
}
